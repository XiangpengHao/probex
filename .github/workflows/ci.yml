name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nix-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Check formatting
        run: nix develop --accept-flake-config -c cargo fmt --all -- --check

      - name: Build frontend bundle
        run: nix develop --accept-flake-config -c dx bundle --release --platform web -p probex-viewer

      - name: Sync bundled frontend assets
        run: |
          rm -rf probex/assets/viewer
          mkdir -p probex/assets/viewer
          cp -a target/dx/probex-viewer/release/web/public/. probex/assets/viewer/

      - name: Clippy
        env:
          PROBEX_SKIP_FRONTEND_BUNDLE: "1"
        run: nix develop --accept-flake-config -c cargo clippy -p probex -p probex-common -p probex-viewer --all-targets

      - name: Check host crates
        env:
          PROBEX_SKIP_FRONTEND_BUNDLE: "1"
        run: nix develop --accept-flake-config -c cargo check -p probex -p probex-common

      - name: Check viewer wasm target
        run: nix develop --accept-flake-config -c cargo check -p probex-viewer --target wasm32-unknown-unknown

      - name: Build release binary
        env:
          PROBEX_SKIP_FRONTEND_BUNDLE: "1"
        run: nix develop --accept-flake-config -c cargo build --release -p probex

      - name: Verify packaged frontend asset
        env:
          PROBEX_SKIP_FRONTEND_BUNDLE: "1"
        run: |
          nix develop --accept-flake-config -c cargo package -p probex --allow-dirty --no-verify --list | grep "^assets/viewer/index.html$"
