name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: /tmp/cargo-target
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Compute and bump versions
        id: release
        run: |
          set -euo pipefail
          bump="${{ github.event.inputs.bump }}"
          current_version="$(sed -n 's/^version = "\(.*\)"/\1/p' probex/Cargo.toml | head -n1)"

          for manifest in probex-common/Cargo.toml probex-ebpf/Cargo.toml; do
            manifest_version="$(sed -n 's/^version = "\(.*\)"/\1/p' "$manifest" | head -n1)"
            if [[ "$manifest_version" != "$current_version" ]]; then
              echo "version mismatch in $manifest: expected $current_version, found $manifest_version"
              exit 1
            fi
          done

          if [[ ! "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "unsupported current version format: $current_version"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "$bump" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            *)
              echo "invalid bump type: $bump"
              exit 1
              ;;
          esac

          version="${major}.${minor}.${patch}"

          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "tag already exists: $tag"
            exit 1
          fi

          for manifest in probex-common/Cargo.toml probex-ebpf/Cargo.toml probex/Cargo.toml; do
            sed -i -E "0,/^version = \".*\"/s//version = \"$version\"/" "$manifest"
          done
          sed -i -E \
            "s#(probex-common = \{ path = \"\.\./probex-common\", version = \")[^\"]+(\", features = \[\"user\"\] \})#\1$version\2#" \
            probex/Cargo.toml
          sed -i -E \
            "s#(probex-ebpf = \{ path = \"\.\./probex-ebpf\", version = \")[^\"]+(\" \})#\1$version\2#" \
            probex/Cargo.toml
          sed -i -E \
            "s#(probex-common = \{ path = \"\.\./probex-common\", version = \")[^\"]+(\" \})#\1$version\2#" \
            probex-ebpf/Cargo.toml

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Update lockfile
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            cargo update -w
          '

      - name: Commit version bump
        id: version_commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add probex/Cargo.toml probex-common/Cargo.toml probex-ebpf/Cargo.toml Cargo.lock
          git commit -m "release: bump version to ${{ steps.release.outputs.version }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Ensure crate versions are not already published
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            for crate in probex-common probex-ebpf probex; do
              if cargo info "$crate@$RELEASE_VERSION" >/dev/null 2>&1; then
                echo "$crate@$RELEASE_VERSION is already published on crates.io"
                exit 1
              fi
            done
          '

      - name: Build frontend bundle
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            dx bundle --release --platform web -p probex-viewer
            rm -rf probex/assets/viewer
            mkdir -p probex/assets/viewer
            cp -a target/dx/probex-viewer/release/web/public/. probex/assets/viewer/
          '

      - name: Validate package contents
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            cargo package -p probex --allow-dirty --no-verify --list | grep "^assets/viewer/index.html$"
          '

      - name: Publish probex-common
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            cargo publish -p probex-common --locked --token "$CARGO_REGISTRY_TOKEN"
          '

      - name: Wait for probex-common index propagation
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            for attempt in $(seq 1 30); do
              if cargo info "probex-common@$RELEASE_VERSION" >/dev/null 2>&1; then
                exit 0
              fi
              sleep 10
            done
            echo "probex-common@$RELEASE_VERSION did not appear in crates.io index in time"
            exit 1
          '

      - name: Publish probex-ebpf
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            cargo publish -p probex-ebpf --locked --token "$CARGO_REGISTRY_TOKEN"
          '

      - name: Wait for probex-ebpf index propagation
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            for attempt in $(seq 1 30); do
              if cargo info "probex-ebpf@$RELEASE_VERSION" >/dev/null 2>&1; then
                exit 0
              fi
              sleep 10
            done
            echo "probex-ebpf@$RELEASE_VERSION did not appear in crates.io index in time"
            exit 1
          '

      - name: Publish probex
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            cargo publish -p probex --locked --token "$CARGO_REGISTRY_TOKEN"
          '

      - name: Build release binary
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail
            cargo build --release -p probex --locked
          '

      - name: Package release artifacts
        id: package
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          archive="probex-linux-x86_64-v${version}.tar.gz"
          mkdir -p dist
          cp "$CARGO_TARGET_DIR/release/probex" dist/
          cp README.md dist/
          tar -C dist -czf "$archive" .
          sha256sum "$archive" > "${archive}.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ steps.version_commit.outputs.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
